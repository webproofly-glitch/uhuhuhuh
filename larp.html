    <html lang="en">
    <head>
    <meta charset="UTF-8" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    :root{
    --bg:#111111;--card:#232323;--card-hover:#2a2a2a;--purple:#7c3aed;--purple-soft:#a78bfa;
    --green:#00A668;--red:#ef4444;--text:#fff;--text-secondary:#8b8b8b;--text-tertiary:#666;
    --border:#2a2a2a;--popover:#1a1a1a;--secondary:#262626;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain;overflow:hidden;-webkit-user-select:none;user-select:none}
    ::-webkit-scrollbar{width:0;height:0}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{appearance:textfield;-moz-appearance:textfield}
    input,textarea,select{-webkit-user-select:text;user-select:text}
    @keyframes rotation{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .loader{width:48px;height:48px;border:5px solid #FFF;border-bottom-color:transparent;border-radius:50%;display:inline-block;box-sizing:border-box;animation:rotation 1s linear infinite}
    button{-webkit-tap-highlight-color:transparent}
    .tap-feedback{transition:transform .18s cubic-bezier(.2,.8,.2,1),opacity .18s ease,filter .18s ease;transform:translateZ(0)}
    .tap-feedback:active{transform:scale(.985)}
    .tap-feedback-soft:active{transform:scale(.992)}
    </style>
    </head>
    <body>
    <div id="root"></div>
    <script>
    // Simple client-side protection using the new serverless validate endpoint
    (async function () {
        try {
            const res = await fetch('/api/license/validate', { credentials: 'include' });
            const data = await res.json();
            if (!data.valid) {
                window.location.href = '/dashboard.html';
            }
        } catch {
            window.location.href = '/dashboard.html';
        }
    })();
    </script>
    <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;
    const TOKEN_DATA = [
    { id:"ethereum", name:"Ethereum", symbol:"ETH", color:"#627EEA", icon:"eth" },
    { id:"bitcoin", name:"Bitcoin", symbol:"BTC", color:"#F7931A", icon:"btc" },
    { id:"monad", name:"Monad", symbol:"MON", color:"#836EF9", icon:"mon" },
    { id:"solana", name:"Solana", symbol:"SOL", color:"#9945FF", icon:"sol" },
    { id:"sui", name:"Sui", symbol:"SUI", color:"#4DA2FF", icon:"sui" },
    { id:"polygon", name:"Polygon", symbol:"POL", color:"#8247E5", icon:"pol" },
    { id:"hyper", name:"Hyperliquid", symbol:"HYPE", color:"#00D4AA", icon:"hype" },
    ];
    const TOKEN_DATA_BY_ID = Object.fromEntries(TOKEN_DATA.map(token => [token.id, token]));
    const DEFAULT_TOKEN_ORDER = TOKEN_DATA.map(token => token.id);
    const TOKEN_PRICES = { ethereum:1980.65, bitcoin:68520.30, monad:42.15, solana:148.50, sui:3.85, polygon:0.58, hyper:12.40 };
    const TOKEN_CHANGE_RATES = { ethereum:0.005, bitcoin:-0.008, monad:0.005, solana:0.005, sui:0.005, polygon:-0.008, hyper:0.005 };
    const CURRENCY_SYMBOLS = { USD:"$", EUR:"€", GBP:"£", JPY:"¥", CHF:"Fr." };
    const CURRENCY_RATES = { USD:1, EUR:0.92, GBP:0.79, JPY:149.5, CHF:0.88 };
    const CURRENCIES = ["USD","EUR","GBP","JPY","CHF"];
    const NOTIFICATION_COINS = [
    { id:'sol', symbol:'SOL', color:'#9945FF' },
    { id:'eth', symbol:'ETH', color:'#627EEA' },
    { id:'btc', symbol:'BTC', color:'#F7931A' },
    { id:'mon', symbol:'MON', color:'#836EF9' },
    { id:'sui', symbol:'SUI', color:'#4DA2FF' },
    { id:'pol', symbol:'POL', color:'#8247E5' },
    { id:'hype', symbol:'HYPE', color:'#00D4AA' },
    { id:'usdt', symbol:'USDT', color:'#26A17B' },
    { id:'usdc', symbol:'USDC', color:'#2775CA' },
    ];
    const NOTIFICATION_TIME_UNITS = { sec:1000, min:60000, hr:3600000 };
    const APP_STORAGE_KEY = 'phantom-larp-app-state-v1';
    const NOTIFICATION_STORAGE_KEY = 'phantom-larp-notification-state-v1';
    const AVAILABLE_CURRENCIES = ['USD','EUR','GBP','JPY','CHF','CAD'];
    const createInitialNotificationCoins = () => Object.fromEntries(NOTIFICATION_COINS.map(coin => [coin.id, { selected:false, from:'', to:'' }]));
    const readStorage = (key, fallback) => {
    try {
        if (typeof window === 'undefined' || !window.localStorage) return fallback;
        const raw = window.localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
    } catch (error) {
        return fallback;
    }
    };
    const writeStorage = (key, value) => {
    try {
        if (typeof window === 'undefined' || !window.localStorage) return;
        window.localStorage.setItem(key, JSON.stringify(value));
    } catch (error) {}
    };
    const normalizeTokenOrder = (value) => {
    const seen = new Set();
    const nextOrder = [];
    if (Array.isArray(value)) {
        value.forEach(id => {
        if (DEFAULT_TOKEN_ORDER.includes(id) && !seen.has(id)) {
            seen.add(id);
            nextOrder.push(id);
        }
        });
    }
    DEFAULT_TOKEN_ORDER.forEach(id => {
        if (!seen.has(id)) nextOrder.push(id);
    });
    return nextOrder;
    };
    const getDefaultAppState = () => ({
    tokenAmounts: Object.fromEntries(TOKEN_DATA.map(token => [token.id, 0])),
    tokenOrder: [...DEFAULT_TOKEN_ORDER],
    cashBalance: 0,
    walletDisplayName: 'CoinLarp',
    walletHandle: 'coinlarp',
    walletEmoji: '💸',
    currency: 'USD',
    });
    const readPersistedAppState = () => {
    const fallback = getDefaultAppState();
    const stored = readStorage(APP_STORAGE_KEY, null);
    if (!stored || typeof stored !== 'object') return fallback;
    const tokenAmounts = Object.fromEntries(TOKEN_DATA.map(token => {
        const amount = Number(stored.tokenAmounts && stored.tokenAmounts[token.id]);
        return [token.id, Number.isFinite(amount) && amount >= 0 ? amount : 0];
    }));
    return {
        tokenAmounts,
        tokenOrder: normalizeTokenOrder(stored.tokenOrder),
        cashBalance: Number.isFinite(Number(stored.cashBalance)) && Number(stored.cashBalance) >= 0 ? Number(stored.cashBalance) : fallback.cashBalance,
        walletDisplayName: typeof stored.walletDisplayName === 'string' && stored.walletDisplayName.trim() ? stored.walletDisplayName : fallback.walletDisplayName,
        walletHandle: typeof stored.walletHandle === 'string' && stored.walletHandle.replace(/@/g,'').trim() ? stored.walletHandle.replace(/@/g,'').trim() : fallback.walletHandle,
        walletEmoji: getSingleEmoji(stored.walletEmoji) || fallback.walletEmoji,
        currency: typeof stored.currency === 'string' && AVAILABLE_CURRENCIES.includes(stored.currency) ? stored.currency : fallback.currency,
    };
    };
    const getDefaultNotificationState = () => ({
    coinInputs: createInitialNotificationCoins(),
    mode: 'manual',
    autoType: 'random',
    randomMin: '10',
    randomMax: '30',
    randomUnit: 'sec',
    fixedEvery: '1',
    fixedUnit: 'min',
    });
    const readPersistedNotificationState = () => {
    const fallback = getDefaultNotificationState();
    const stored = readStorage(NOTIFICATION_STORAGE_KEY, null);
    if (!stored || typeof stored !== 'object') return fallback;
    return {
        coinInputs: Object.fromEntries(NOTIFICATION_COINS.map(coin => {
        const config = stored.coinInputs && stored.coinInputs[coin.id] ? stored.coinInputs[coin.id] : fallback.coinInputs[coin.id];
        return [coin.id, {
            selected: !!config.selected,
            from: typeof config.from === 'string' ? config.from : '',
            to: typeof config.to === 'string' ? config.to : '',
        }];
        })),
        mode: stored.mode === 'auto' ? 'auto' : 'manual',
        autoType: stored.autoType === 'fixed' ? 'fixed' : 'random',
        randomMin: typeof stored.randomMin === 'string' ? stored.randomMin : fallback.randomMin,
        randomMax: typeof stored.randomMax === 'string' ? stored.randomMax : fallback.randomMax,
        randomUnit: ['sec','min','hr'].includes(stored.randomUnit) ? stored.randomUnit : fallback.randomUnit,
        fixedEvery: typeof stored.fixedEvery === 'string' ? stored.fixedEvery : fallback.fixedEvery,
        fixedUnit: ['sec','min','hr'].includes(stored.fixedUnit) ? stored.fixedUnit : fallback.fixedUnit,
    };
    };
    const formatTokenAmount = (value) => {
    if (!Number.isFinite(value) || value <= 0) return '0';
    return value.toLocaleString('en-US', {
        useGrouping: false,
        minimumFractionDigits: 0,
        maximumFractionDigits: value < 1 ? 8 : 4,
    });
    };
    const formatNotificationAmount = (value) => {
    if (!Number.isFinite(value) || value <= 0) return '0';
    return value.toLocaleString('en-US', {
        useGrouping: false,
        minimumFractionDigits: 0,
        maximumFractionDigits: value < 1 ? 6 : 4,
    });
    };
    const getSingleEmoji = (value) => {
    const input = (value || '').trim();
    if (!input) return '';
    const segmenter = typeof Intl !== 'undefined' && Intl.Segmenter ? new Intl.Segmenter(undefined, { granularity:'grapheme' }) : null;
    const parts = segmenter ? Array.from(segmenter.segment(input), ({ segment }) => segment) : Array.from(input);
    for (const part of parts) {
        if (/(\p{Extended_Pictographic}|\p{Regional_Indicator})/u.test(part)) return part;
    }
    return '';
    };
    function TokenIcon({ token, size = 40 }) {
    const s = size;
    const h = size + 1;
    const icons = {
        eth: <div style={{width:s,height:h,borderRadius:'50%',overflow:'hidden',display:'flex',background:'#111'}}><img src="https://icon-icons.com/download-file?file=https%3A%2F%2Fimages.icon-icons.com%2F2429%2FPNG%2F512%2Fethereum_logo_icon_147293.png&id=147293&pack_or_individual=pack" alt="Ethereum" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} /></div>,
        btc: <svg width={s} height={h} viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="20" fill="#F7931A"/><path d="M27.2 17.4c.4-2.5-1.5-3.8-4.2-4.7l.9-3.5-2.1-.5-.8 3.4c-.6-.1-1.1-.3-1.7-.4l.8-3.4-2.1-.5-.9 3.5c-.5-.1-.9-.2-1.4-.3l-2.9-.7-.6 2.2s1.5.4 1.5.4c.9.2 1 .7 1 1.1l-1 4.1c.1 0 .1 0 .2.1h-.2l-1.4 5.8c-.1.3-.4.7-1 .5 0 0-1.5-.4-1.5-.4l-1 2.4 2.7.7c.5.1 1 .3 1.5.4l-.9 3.5 2.1.5.9-3.5c.6.2 1.1.3 1.7.4l-.9 3.5 2.1.5.9-3.5c3.6.7 6.4.4 7.5-2.9.9-2.6 0-4.1-1.9-5.1 1.4-.3 2.4-1.3 2.7-3.2zM23.8 24c-.7 2.6-5.1 1.2-6.5.8l1.2-4.6c1.5.4 6 1.1 5.3 3.8zm.7-6.7c-.6 2.4-4.3 1.2-5.5.9l1-4.2c1.2.3 5.1.9 4.5 3.3z" fill="white"/></svg>,
        mon: <div style={{width:s,height:h,borderRadius:'50%',overflow:'hidden',display:'flex',background:'#111'}}><img src="https://media.tenor.com/kiFLnXSFpb0AAAAe/monad-logo.png" alt="Monad" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} /></div>,
        sol: <div style={{width:s,height:h,borderRadius:'50%',overflow:'hidden',display:'flex',background:'#000'}}><img src="https://cdn.creativefabrica.com/2021/06/16/Cryptocurrency-Solana-Logo-Graphics-13460284-1-1-580x435.jpg" alt="Solana" style={{width:'100%',height:'100%',objectFit:'cover',display:'block',transform:'scale(1.28)'}} /></div>,
        pol: <div style={{width:s,height:h,borderRadius:'50%',overflow:'hidden',display:'flex',background:'#111'}}><img src="https://cdn.vectorstock.com/i/1000v/45/46/polygon-cryptocurrency-logo-icon-crypto-currency-vector-49864546.jpg" alt="Polygon" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center -1px',display:'block',transform:'scale(1.12)'}} /></div>,
        hype: <div style={{width:s,height:h,borderRadius:'50%',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',background:'transparent'}}><img src="https://app.hyperliquid.xyz/coins/HYPE_spot.svg" alt="Hyper" style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}} /></div>,
        sui: <div style={{width:s,height:h,borderRadius:'50%',overflow:'hidden',display:'flex',background:'#111'}}><img src="https://asset.brandfetch.io/idBUiFFswD/id-r38SxY1.jpeg" alt="Sui" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} /></div>,
    };
    return icons[token] || <div style={{width:s,height:h,borderRadius:'50%',background:'#555'}}/>;
    }
    function SettingsModal({ open, onClose, tokenAmounts, onUpdateAmount, cashBalance, onUpdateCash, walletDisplayName, onUpdateDisplayName, walletHandle, onUpdateHandle, walletEmoji, onUpdateEmoji, currency, onUpdateCurrency, initialTab }) {
    const [tab, setTab] = useState(initialTab||'tokens');
    const [amountInputs, setAmountInputs] = useState({});
    const [cashInput, setCashInput] = useState('');
    const [currencyInput, setCurrencyInput] = useState(currency);
    const [nameInput, setNameInput] = useState(walletDisplayName);
    const [handleInput, setHandleInput] = useState(walletHandle);
    const [emojiInput, setEmojiInput] = useState(getSingleEmoji(walletEmoji));
    const [valueInputs, setValueInputs] = useState({});
    const [shouldRender, setShouldRender] = useState(open);
    const [isVisible, setIsVisible] = useState(open);
    const openFrameRef = useRef(null);
    const openFrame2Ref = useRef(null);
    useEffect(() => {
        if (open) {
        setShouldRender(true);
        setIsVisible(false);
        openFrameRef.current = requestAnimationFrame(() => {
            openFrame2Ref.current = requestAnimationFrame(() => setIsVisible(true));
        });
        return () => {
            if (openFrameRef.current) cancelAnimationFrame(openFrameRef.current);
            if (openFrame2Ref.current) cancelAnimationFrame(openFrame2Ref.current);
        };
        }
        setIsVisible(false);
        const timeout = setTimeout(() => setShouldRender(false), 300);
        return () => clearTimeout(timeout);
    }, [open]);
    useEffect(() => {
        if (open) {
        setTab(initialTab||'tokens');
        setAmountInputs(Object.fromEntries(TOKEN_DATA.map(t => [t.id, tokenAmounts[t.id] > 0 ? tokenAmounts[t.id].toString() : ''])));
        setCashInput(cashBalance > 0 ? cashBalance.toString() : '');
        setCurrencyInput(currency);
        setNameInput(walletDisplayName);
        setHandleInput(walletHandle);
        setEmojiInput(getSingleEmoji(walletEmoji));
        setValueInputs({});
        }
    }, [open, tokenAmounts, cashBalance, walletDisplayName, walletHandle, walletEmoji, currency, initialTab]);
    // Prevent background scroll when modal is open
    useEffect(() => {
        if (shouldRender) {
        document.body.style.overflow = 'hidden';
        } else {
        document.body.style.overflow = '';
        }
        return () => { document.body.style.overflow = ''; };
    }, [shouldRender]);
    if (!shouldRender) return null;
    // Save logic for each tab
    const handleSave = () => {
        if (tab === 'tokens') {
        Object.entries(amountInputs).forEach(([tokenId, val]) => {
            const num = parseFloat(val);
            if (!isNaN(num) && num >= 0) onUpdateAmount(tokenId, num);
        });
        } else if (tab === 'cash') {
        const cashVal = parseFloat(cashInput);
        if (!isNaN(cashVal) && cashVal >= 0) onUpdateCash(cashVal);
        onUpdateCurrency(currencyInput);
        } else if (tab === 'profile') {
        onUpdateDisplayName(nameInput);
        onUpdateHandle(handleInput);
        onUpdateEmoji(getSingleEmoji(emojiInput) || getSingleEmoji(walletEmoji) || '💸');
        }
        onClose();
    };
    // Modal styles
    const modalStyle = { position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'flex-end',justifyContent:'center',transition:'opacity .3s cubic-bezier(.22,1,.36,1)',opacity:isVisible?1:0 };
    const panelStyle = { background:'#1C1C1E',borderRadius:'24px 24px 0 0',width:'100%',maxWidth:430,maxHeight:'88vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 -4px 60px rgba(0,0,0,0.7)',transform:isVisible?'translateY(0) scale(1)':'translateY(42px) scale(.972)',opacity:isVisible?1:.92,transition:'transform .34s cubic-bezier(.22,1,.36,1), opacity .3s cubic-bezier(.22,1,.36,1)',willChange:'transform, opacity' };
    const tabBtnStyle = (active) => ({ flex:1,padding:'10px 0',borderRadius:10,border:'none',cursor:'pointer',background:active?'#AB9FF2':'#2C2C2E',color:active?'#000':'#9B9B9B',fontWeight:600,fontSize:14,fontFamily:'inherit',transition:'all .2s' });
    const inputStyle = { width:'100%',padding:'12px 14px',borderRadius:12,background:'#2C2C2E',border:'1px solid #3A3A3C',color:'#fff',fontSize:15,outline:'none',boxSizing:'border-box',fontFamily:'inherit',marginBottom:14 };
    const labelStyle = { color:'#9B9B9B',fontSize:12,marginBottom:8,fontWeight:500,textTransform:'uppercase',letterSpacing:'0.5px' };
    const saveBtnStyle = { width:'100%',padding:'16px',borderRadius:14,border:'none',background:'#AB9FF2',color:'#000',fontWeight:700,fontSize:16,cursor:'pointer',fontFamily:'inherit',marginTop:8 };
    return (
        <div style={modalStyle} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
        <div style={panelStyle} onClick={e=>e.stopPropagation()}>
            <div style={{ display:'flex',justifyContent:'center',padding:'12px 0 4px' }}>
            <div style={{ width:36,height:4,borderRadius:2,background:'#3A3A3C' }}/>
            </div>
            <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 20px 12px' }}>
            <h2 style={{ color:'#fff',fontSize:18,fontWeight:700,margin:0 }}>Settings</h2>
            <button onClick={onClose} style={{ background:'#2C2C2E',border:'none',borderRadius:'50%',width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer' }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            </div>
            <div style={{ display:'flex',gap:6,padding:'0 20px 12px' }}>
            <button style={tabBtnStyle(tab==='tokens')} onClick={()=>setTab('tokens')}>Tokens</button>
            <button style={tabBtnStyle(tab==='cash')} onClick={()=>setTab('cash')}>Cash</button>
            <button style={tabBtnStyle(tab==='profile')} onClick={()=>setTab('profile')}>Profile</button>
            </div>
            <div style={{ flex:1,overflowY:'auto',padding:'0 20px' }}>
            {/* TOKENS TAB */}
            {tab === 'tokens' && (
                <div style={{ paddingBottom:24 }}>
                {/* Hinweis-Box zur Währungsänderung */}
                <div style={{background:'#23232A',borderRadius:12,padding:'12px 16px',marginBottom:18,display:'flex',alignItems:'center',gap:10}}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#AB9FF2" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="1"/></svg>
                    <span style={{color:'#AB9FF2',fontSize:13,fontWeight:500}}>You can change the currency in the <b>Cash</b> tab.</span>
                </div>
                <p style={{ color:'#9B9B9B',fontSize:13,marginBottom:16 }}>Set token amounts in your portfolio</p>
                {TOKEN_DATA.map(token => {
                    const tokenPrice = (TOKEN_PRICES[token.id]||0) * (CURRENCY_RATES[currencyInput]||1);
                    const amount = amountInputs[token.id] ?? '';
                    const handleValueInput = (val) => {
                    setValueInputs(p => ({ ...p, [token.id]: val }));
                    const num = parseFloat(val);
                    if (val === '') {
                        setAmountInputs(p => ({ ...p, [token.id]: '' }));
                    } else if (!isNaN(num) && tokenPrice > 0) {
                        setAmountInputs(p => ({ ...p, [token.id]: formatTokenAmount(num / tokenPrice) }));
                    }
                    };
                    return (
                    <div key={token.id} style={{ marginBottom:18 }}>
                        <div style={{ display:'flex',alignItems:'center',gap:10,marginBottom:7 }}>
                        <TokenIcon token={token.icon} size={28}/>
                        <div><span style={{ color:'#fff',fontWeight:600,fontSize:14 }}>{token.name}</span><span style={{ color:'#6B6B75',fontSize:12,marginLeft:6 }}>{token.symbol}</span></div>
                        </div>
                        <div style={{ position:'relative', marginBottom:8 }}>
                        <input type="number" placeholder={`0`} value={amount}
                            onChange={e => setAmountInputs(p => ({ ...p, [token.id]: e.target.value }))}
                            style={{ ...inputStyle, paddingRight:52, marginBottom:0 }}
                        />
                        <span style={{ position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',color:'#6B6B75',fontSize:13,pointerEvents:'none' }}>{token.symbol}</span>
                        </div>
                        {/* Neues Value-Input */}
                        <div style={{ position:'relative', marginBottom:0 }}>
                        <input type="number" placeholder={`Value in ${currencyInput}`} value={valueInputs[token.id]||''}
                            onChange={e => handleValueInput(e.target.value)}
                            style={{ ...inputStyle, paddingLeft:34, marginBottom:0 }}
                        />
                        <span style={{ position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'#6B6B75',fontSize:13,pointerEvents:'none' }}>{CURRENCY_SYMBOLS[currencyInput]||currencyInput}</span>
                        </div>

            )}
            {/* Bottom Nav */}
            <div style={cs.bottomNav}>
            <div style={{position:'absolute',top:0,left:0,right:0,height:footerContentHeight,display:'flex',alignItems:'center',justifyContent:'center',gap:46,padding:'0px 8px 0px',transform:'translateY(9px)',width:'100%',boxSizing:'border-box'}}>
                {navItems.map(n=>(
                <button key={n.label} style={cs.navBtn(n.active)}>
                    {n.icon}
                </button>
                ))}
            </div>
            </div>
            <ReceiveNotificationModal open={receiveModalOpen} onClose={()=>setReceiveModalOpen(false)}/>
            <SettingsModal open={settingsOpen} onClose={()=>setSettingsOpen(false)} tokenAmounts={tokenAmounts} onUpdateAmount={handleUpdateAmount} cashBalance={cashBalance} onUpdateCash={setCashBalance} walletDisplayName={walletDisplayName} onUpdateDisplayName={setWalletDisplayName} walletHandle={walletHandle} onUpdateHandle={setWalletHandle} walletEmoji={walletEmoji} onUpdateEmoji={setWalletEmoji} currency={currency} onUpdateCurrency={setCurrency} initialTab={settingsTab}/>
        </div>
        </div>
    );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<WalletHome/>);
    </script>
    </body> 
    </html>
